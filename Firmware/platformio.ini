[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.arduino.memory_type = qio_opi 
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  
  ; TFT_eSPI piny podle tvého schématu
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=280
  -D TFT_MOSI=47
  -D TFT_SCLK=21
  -D TFT_CS=16
  -D TFT_DC=17
  -D TFT_RST=-1
  -D CGRAM_OFFSET=1
  -D TFT_RGB_ORDER=TFT_BRG
  -D SPI_FREQUENCY=20000000
  -D LOAD_GLCD=1
  
  ; === LVGL FLAGS ===
  -D LV_CONF_SKIP=1
  -D LV_CONF_INCLUDE_SIMPLE=1
  -D LV_COLOR_DEPTH=16
  -D LV_COLOR_16_SWAP=1
  -D LV_MEM_CUSTOM=1
  -D LV_MEM_CUSTOM_INCLUDE=\"Arduino.h\"
  -D LV_MEM_CUSTOM_ALLOC=ps_malloc  ; <--- TOTO VYNUTÍ 8MB PSRAM!
  -D LV_MEM_CUSTOM_FREE=free
  
  ; --- FONTY ---
  -D LV_FONT_MONTSERRAT_8=1
  -D LV_FONT_MONTSERRAT_10=1
  -D LV_FONT_MONTSERRAT_12=1
  -D LV_FONT_MONTSERRAT_14=1
  -D LV_FONT_MONTSERRAT_16=1
  -D LV_FONT_MONTSERRAT_18=1
  -D LV_FONT_MONTSERRAT_20=1
  -D LV_FONT_MONTSERRAT_22=1
  -D LV_FONT_MONTSERRAT_24=1
  -D LV_FONT_MONTSERRAT_26=1
  -D LV_FONT_MONTSERRAT_28=1
  -D LV_FONT_MONTSERRAT_30=1
  -D LV_FONT_MONTSERRAT_32=1
  -D LV_FONT_MONTSERRAT_34=1
  -D LV_FONT_MONTSERRAT_36=1
  -D LV_FONT_MONTSERRAT_38=1
  -D LV_FONT_MONTSERRAT_40=1
  -D LV_FONT_MONTSERRAT_48=1

lib_deps =
  lvgl/lvgl @ ^8.3.11
  bodmer/TFT_eSPI @ ^2.5.43
  ;adafruit/Adafruit GFX Library @ ^1.11.9
  ;adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3
  jgromes/RadioLib @ ^6.4.2
  adafruit/Adafruit PN532 @ ^1.3.3
  mikalhart/TinyGPSPlus @ ^1.0.3
  crankyoldgit/IRremoteESP8266 @ ^2.8.6
 